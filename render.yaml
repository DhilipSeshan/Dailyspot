services:
  - type: web
    name: dailyspot
    runtime: node
    rootDir: DailySpot
    buildCommand: npm install && npm run seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: ADMIN_EMAIL
        value: admin@dailyspot.com
      - key: ADMIN_PASSWORD
        sync: false
